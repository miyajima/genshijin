name: Run Benchmark

on:
  push:
    branches: ["main"]
    paths:
      - 'skills/**'
      - 'benchmarks/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip benchmark]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r benchmarks/requirements.txt

      - name: Run benchmark
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd benchmarks
          python run.py --trials 3 --update-readme --update-docs

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md docs/benchmark.json
          git diff --staged --quiet || git commit -m "ベンチマーク結果を更新 [skip benchmark]"
          git push
