<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #0d0d0d;
    color: #e8e8e8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card {
    text-align: center;
  }
  .emoji {
    font-size: 160px;
    line-height: 1;
    margin-bottom: 24px;
  }
  .title {
    font-size: 72px;
    font-weight: 700;
    color: #d4a574;
    letter-spacing: 4px;
    margin-bottom: 16px;
  }
  .subtitle {
    font-size: 28px;
    color: #888;
    letter-spacing: 1px;
  }
  .badge {
    display: inline-block;
    margin-top: 24px;
    padding: 8px 24px;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    font-size: 20px;
    color: #7ec87e;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="emoji">🗿</div>
    <div class="title">genshijin</div>
    <div class="subtitle">Claude Code 超圧縮スキル</div>
    <div class="badge">トークン 75% 削減</div>
  </div>
</body>
</html>
